syntax = "proto3";

message ProtoData{
  uint32 device_id = 1;
  float time = 2;
  float e = 3;

  sint32 ax = 4;
  sint32 ay = 5;
  sint32 az = 6;

  sint32 wx = 7;   // velocidade angular em X
  sint32 wy = 8;   // velocidade angular em Y
  sint32 wz = 9;   // velocidade angular em Z

  sint32 pitch = 10;
  sint32 roll  = 11;
  sint32 yaw   = 12;
}
