syntax = "proto3";

message ProtoData{
  uint32 device_id = 1;
  float t   = 2;
  float e   = 3;
  float tmp = 4;

  sint32 ax = 5;
  sint32 ay = 6;
  sint32 az = 7;

  sint32 wx = 8;
  sint32 wy = 9;
  sint32 wz = 10;

  sint32 pitch = 11;
  sint32 roll  = 12;
  sint32 yaw   = 13;

  sint32 q0 = 14;
  sint32 q1 = 15;
  sint32 q2 = 16;
  sint32 q3 = 17;
}